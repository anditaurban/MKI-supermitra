<!-- Profile Section Component -->
<div id="profile-section" class="relative hidden">
    <button id="profile-btn"
        class="flex items-center gap-3 bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-2xl transition-all border border-neutral-100 group">
        <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-white font-bold text-sm overflow-hidden border border-slate-200 shrink-0">
            <img id="user-avatar-img" class="w-full h-full object-cover hidden" src="" alt="Avatar">
            <span id="user-avatar" class="text-slate-600">U</span>
        </div>
        <div class="hidden md:block text-left">
            <p class="text-sm font-semibold text-slate-900 leading-tight" id="user-name">User</p>
            <p class="text-[10px] text-slate-500" id="user-role">Partner</p>
        </div>
        <svg class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 9l-7 7-7-7"></path>
        </svg>
    </button>

    <!-- Dropdown Menu -->
    <div id="profile-dropdown"
        class="absolute right-0 mt-3 w-52 bg-white rounded-2xl shadow-xl border border-neutral-100 py-2 z-50 hidden transform origin-top-right transition-all duration-200">
        <div class="px-4 py-3 border-b border-neutral-50 mb-1">
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Menu Anda</p>
        </div>
        <!-- Profile Menu -->
        <a href="/profile.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-red-50 hover:text-red-700 transition-all group">
            <div
                class="w-8 h-8 rounded-lg bg-slate-50 group-hover:bg-red-100 flex items-center justify-center transition-colors text-slate-400 group-hover:text-red-600">
                <i class="ri-user-settings-line text-lg"></i>
            </div>
            <span class="font-medium">Profil</span>
        </a>
        <!-- Pelatihan Menu -->
        <a href="/course.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-red-50 hover:text-red-700 transition-all group">
            <div
                class="w-8 h-8 rounded-lg bg-slate-50 group-hover:bg-red-100 flex items-center justify-center transition-colors text-slate-400 group-hover:text-red-600">
                <i class="ri-book-open-line text-lg"></i>
            </div>
            <span class="font-medium">Pelatihan</span>
        </a>
        <!-- Store Menu (Belanja Item) -->
        <a href="/store.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-red-50 hover:text-red-700 transition-all group">
            <div
                class="w-8 h-8 rounded-lg bg-slate-50 group-hover:bg-red-100 flex items-center justify-center transition-colors text-slate-400 group-hover:text-red-600">
                <i class="ri-store-2-line text-lg"></i>
            </div>
            <span class="font-medium">Belanja Item</span>
        </a>
        <!-- Pesanan Menu -->
        <a href="/orders.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-red-50 hover:text-red-700 transition-all group">
            <div
                class="w-8 h-8 rounded-lg bg-slate-50 group-hover:bg-red-100 flex items-center justify-center transition-colors text-slate-400 group-hover:text-red-600">
                <i class="ri-shopping-bag-3-line text-lg"></i>
            </div>
            <span class="font-medium">Pesanan Saya</span>
        </a>
        <!-- Promotion Menu -->
        <a href="/promotion.html"
            class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-red-50 hover:text-red-700 transition-all group">
            <div
                class="w-8 h-8 rounded-lg bg-slate-50 group-hover:bg-red-100 flex items-center justify-center transition-colors text-slate-400 group-hover:text-red-600">
                <i class="ri-megaphone-line text-lg"></i>
            </div>
            <span class="font-medium">Media Promosi</span>
        </a>
        <hr class="my-2 border-neutral-50 mx-4">
        <button id="logout-btn"
            class="flex items-center gap-3 w-full px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-all font-semibold">
            <div class="w-8 h-8 rounded-lg bg-red-50 flex items-center justify-center">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
            </div>
            <span>Keluar Akun</span>
        </button>
    </div>
</div>

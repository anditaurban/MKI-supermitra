<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/webp" href="/assets/images/logo.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemutar Video - Master Kuliner Indonesia</title>

    <!-- FONT POPPINS & INTER -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="/css/main.css" rel="stylesheet">

    <!-- REMIXICON -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body class="bg-slate-50 font-inter text-slate-800 antialiased overflow-x-hidden" id="course-player">

    <!-- Navbar -->
    <header
        class="fixed top-0 left-0 right-0 w-full z-50 transition-all duration-300 bg-white/95 backdrop-blur-sm border-b border-neutral-100 h-20">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a class="cursor-pointer flex items-center gap-3" href="/store.html">
                <div class="w-24">
                    <img src="/assets/images/logo.webp" alt="Logo" class="w-full h-full object-contain"
                        onerror="this.src='https://via.placeholder.com/150x50?text=Logo'">
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="/course.html"
                    class="hidden md:flex items-center gap-2 mr-2 px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 hover:text-red-600 hover:border-red-200 rounded-xl transition-all shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Daftar Materi
                </a>

                <!-- Global Profile Navigation Placeholder -->
                <div id="profile-nav-placeholder"></div>
            </div>
        </div>
    </header>

    <main class="pt-28 pb-16 min-h-screen">
        <div class="container mx-auto px-4 max-w-7xl">

            <!-- Breadcrumb Navigation -->
            <div class="mb-6 flex gap-2 text-sm text-slate-500 font-medium items-center">
                <a href="/course.html" class="hover:text-red-600 transition-colors">Modul Pelatihan</a>
                <span>/</span>
                <span id="breadcrumb-title" class="text-slate-800">Video Player</span>
            </div>

            <div id="video-player-section" class="flex flex-col lg:flex-row gap-8">
                <!-- Video Player Area -->
                <div class="lg:w-2/3">
                    <div
                        class="bg-black rounded-2xl overflow-hidden shadow-xl aspect-video mb-6 relative border border-neutral-800">
                        <iframe id="main-video-player" class="absolute inset-0 w-full h-full" src=""
                            title="Video Edukasi Pembuatan Makanan" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
                            allowfullscreen>
                        </iframe>
                    </div>

                    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-neutral-100">
                        <div class="flex items-start justify-between gap-4 mb-4">
                            <h2 id="current-video-title" class="text-2xl font-bold font-poppins text-slate-900">Materi
                                Pelatihan</h2>
                            <span
                                class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full whitespace-nowrap">Wajib
                                Tonton</span>
                        </div>
                        <p id="current-video-desc" class="text-slate-600 mb-6 leading-relaxed">Silakan pilih salah satu
                            video dalam playlist untuk mulai belajar.</p>
                    </div>
                </div>

                <!-- Playlist / Course List Area -->
                <div class="lg:w-1/3">
                    <div
                        class="bg-white rounded-2xl shadow-sm border border-neutral-100 p-6 overscroll-contain sticky top-28">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-bold font-poppins text-lg text-slate-900">Daftar Materi</h3>
                            <span id="playlist-progress-text" class="text-sm text-slate-500 font-medium">0 / 0
                                Selesai</span>
                        </div>

                        <!-- Progress Bar -->
                        <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
                            <div id="playlist-progress-bar"
                                class="bg-green-500 h-2 rounded-full transition-all duration-500" style="width: 0%">
                            </div>
                        </div>

                        <div id="course-playlist-container" class="space-y-3 max-h-[450px] overflow-y-auto pr-2">
                            <div class="text-center py-8">
                                <span class="animate-pulse text-slate-500 text-sm">Memuat daftar video...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Global Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Modern Logout Modal -->

    <!-- Modern Logout Modal -->
    <div id="logoutModal" class="fixed inset-0 z-[2000] hidden overflow-y-auto px-4 py-6 sm:px-0">
        <!-- Backdrop with glassmorphism -->
        <div onclick="closeLogoutModal()"
            class="fixed inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity duration-300"></div>

        <!-- Modal Card -->
        <div class="relative mx-auto mt-40 max-w-sm transform overflow-hidden rounded-3xl bg-white shadow-2xl transition-all duration-300 scale-95 opacity-0"
            id="logoutModalCard">
            <div class="p-8 text-center">
                <!-- Warning Icon -->
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-50 text-amber-500 mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
                
                <h2 class="text-xl font-bold text-slate-900 font-poppins mb-2">Keluar Akun?</h2>
                <p class="text-slate-500 text-sm mb-8">Anda perlu masuk kembali untuk mengakses portal kemitraan Anda.</p>

                <div class="space-y-3">
                    <button onclick="confirmLogout()"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-600/20 transition-all transform active:scale-[0.98]">
                        Ya, Keluar
                    </button>
                    <button onclick="closeLogoutModal()"
                        class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all transform active:scale-[0.98]">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/modules/api.js"></script>
    <script src="/js/modules/components.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="/js/pages/course_player.js"></script>
</body>

</html>

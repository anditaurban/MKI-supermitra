<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya - Master Kuliner Indonesia</title>

    <!-- FONT POPPINS & INTER -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="/css/main.css" rel="stylesheet">
</head>

<body class="bg-gray-50 font-inter text-slate-800 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <header
        class="fixed top-0 left-0 right-0 w-full z-50 transition-all duration-300 bg-white/95 backdrop-blur-sm border-b border-neutral-100 h-20">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a class="cursor-pointer flex items-center gap-3" href="/store.html">
                <div class="w-24">
                    <img src="/assets/images/logo.webp" alt="Logo" class="w-full h-full object-contain">
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="/store.html" class="hidden md:block mr-2 text-sm font-semibold text-slate-600 hover:text-red-600 transition-colors">
                    Kembali ke Toko
                </a>

                <!-- Profile Section -->
                <div class="relative">
                    <button id="profile-btn" class="flex items-center gap-3 hover:bg-gray-50 px-3 py-2 rounded-lg transition-colors">
                        <div class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-sm">
                            <span id="user-avatar">U</span>
                        </div>
                        <div class="hidden md:block text-left">
                            <p class="text-sm font-semibold text-slate-900" id="user-name">User</p>
                            <p class="text-xs text-slate-500" id="user-role">Partner</p>
                        </div>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>

                    <!-- Dropdown Menu -->
                    <div id="profile-dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-neutral-100 py-1 z-50 hidden">
                        <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            Profile
                        </a>
                        <a href="#" id="course-link" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                            </svg>
                            Course
                        </a>
                        <a href="/orders.html" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-gray-50 transition-colors font-semibold text-red-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                            </svg>
                            Pesanan Saya
                        </a>
                        <hr class="my-1 border-neutral-100">
                        <button id="logout-btn" class="flex items-center gap-3 w-full px-4 py-2 text-sm text-slate-700 hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-16">
        <div class="container mx-auto px-4 max-w-5xl">
            <h1 class="text-2xl md:text-3xl font-poppins font-bold text-slate-900 mb-6">Pesanan Saya</h1>

            <!-- Orders Container -->
            <div class="bg-white rounded-2xl shadow-sm border border-neutral-100 overflow-hidden">
                <!-- Loading -->
                <div id="loading-state" class="text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
                    <p class="mt-4 text-gray-600">Memuat pesanan...</p>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="text-center py-12 hidden">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                    </svg>
                    <h3 class="mt-4 text-sm font-medium text-gray-900">Belum ada pesanan</h3>
                    <p class="mt-1 text-sm text-gray-500">Anda belum melakukan pemesanan apapun.</p>
                    <a href="/store.html" class="mt-6 inline-block bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded-xl transition-colors">
                        Mulai Belanja
                    </a>
                </div>

                <!-- Orders List -->
                <div id="orders-list" class="divide-y divide-neutral-100 hidden">
                    <!-- Orders will be loaded here -->
                </div>

                <!-- Pagination -->
                <div id="pagination" class="p-6 border-t border-neutral-100 flex items-center justify-between hidden bg-gray-50">
                    <button id="prev-page" class="px-4 py-2 bg-white border border-neutral-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50 hover:text-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                        Sebelumnya
                    </button>
                    <span id="page-info" class="text-sm font-medium text-slate-600">Halaman 1 dari 1</span>
                    <button id="next-page" class="px-4 py-2 bg-white border border-neutral-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50 hover:text-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                        Selanjutnya
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="/js/modules/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is logged in
            const user = JSON.parse(localStorage.getItem('mki_user'));
            if (!user) {
                window.location.href = '/';
                return;
            }

            // Load user profile data
            loadUserProfile(user);

            // Profile dropdown logic
            const profileBtn = document.getElementById('profile-btn');
            const profileDropdown = document.getElementById('profile-dropdown');
            const logoutBtn = document.getElementById('logout-btn');
            const profileLink = document.querySelector('#profile-dropdown a[href="#"]');
            const courseLink = document.getElementById('course-link');

            profileBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                profileDropdown.classList.toggle('hidden');
            });

            // Profile & Course link dummy
            if(profileLink) {
                profileLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    profileDropdown.classList.add('hidden');
                    Swal.fire({
                        title: 'Profile',
                        text: 'Fitur profile akan segera hadir!',
                        icon: 'info',
                        confirmButtonColor: '#dc2626'
                    });
                });
            }

            if(courseLink) {
                courseLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    profileDropdown.classList.add('hidden');
                    Swal.fire({
                        title: 'Course',
                        text: 'Fitur course akan segera hadir!',
                        icon: 'info',
                        confirmButtonColor: '#dc2626'
                    });
                });
            }

            document.addEventListener('click', function(e) {
                if (!profileBtn.contains(e.target) && !profileDropdown.contains(e.target)) {
                    profileDropdown.classList.add('hidden');
                }
            });

            logoutBtn.addEventListener('click', function() {
                Swal.fire({
                    title: 'Apakah Anda yakin?',
                    text: 'Anda akan keluar dari akun ini',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#dc2626',
                    cancelButtonColor: '#6b7280',
                    confirmButtonText: 'Ya, Logout',
                    cancelButtonText: 'Batal'
                }).then((result) => {
                    if (result.isConfirmed) {
                        localStorage.removeItem('mki_user');
                        localStorage.removeItem('mki_cart');
                        window.location.href = '/';
                    }
                });
            });

            function loadUserProfile(user) {
                const userName = user.name || user.email || 'User';
                document.getElementById('user-name').textContent = userName;
                const userRole = user.role === 'admin' ? 'Admin' : 'Partner';
                document.getElementById('user-role').textContent = userRole;
                const firstLetter = userName.charAt(0).toUpperCase();
                document.getElementById('user-avatar').textContent = firstLetter;
            }

            // Orders Logic
            let currentPage = 1;

            function fetchOrders(page) {
                const customerId = user.customer_id;
                if (!customerId) {
                    showEmpty();
                    return;
                }

                document.getElementById('loading-state').classList.remove('hidden');
                document.getElementById('orders-list').classList.add('hidden');
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('pagination').classList.add('hidden');

                fetch(`${baseUrl}/table/sales_webstore/${customerId}/${page}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer 3ed66de3108ce387e9d134c419c0fdd61687c3b06760419d32493b18366999d2',
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => {
                    if (!response.ok) throw new Error('HTTP error ' + response.status);
                    return response.json();
                })
                .then(data => {
                    if (data && data.tableData && data.tableData.length > 0) {
                        renderOrders(data.tableData);
                        renderPagination(data.totalPages, data.totalRecords, page, data.period);
                    } else {
                        showEmpty();
                    }
                })
                .catch(error => {
                    console.error('Error fetching orders:', error);
                    showEmpty();
                });
            }

            function showEmpty() {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
            }

            function getStatusColor(status) {
                if (!status) return 'bg-gray-100 text-gray-800';
                status = status.toLowerCase();
                if (status.includes('menunggu')) return 'bg-orange-100 text-orange-800 border-[0.5px] border-orange-200';
                if (status.includes('verifikasi')) return 'bg-blue-100 text-blue-800 border-[0.5px] border-blue-200';
                if (status.includes('proses')) return 'bg-indigo-100 text-indigo-800 border-[0.5px] border-indigo-200';
                if (status.includes('selesai')) return 'bg-emerald-100 text-emerald-800 border-[0.5px] border-emerald-200';
                if (status.includes('batal')) return 'bg-red-100 text-red-800 border-[0.5px] border-red-200';
                if (status.includes('sebagian')) return 'bg-yellow-100 text-yellow-800 border-[0.5px] border-yellow-200';
                return 'bg-gray-100 text-gray-800 border-[0.5px] border-gray-200';
            }

            function renderOrders(orders) {
                document.getElementById('loading-state').classList.add('hidden');
                const list = document.getElementById('orders-list');
                list.classList.remove('hidden');
                
                list.innerHTML = orders.map(order => `
                    <div class="p-6 hover:bg-slate-50 transition-colors flex flex-col md:flex-row gap-6 items-start md:items-center justify-between">
                        <div class="flex-1">
                            <div class="flex flex-wrap items-center gap-3 mb-2">
                                <span class="font-bold text-slate-800 font-poppins text-lg">${order.no_inv}</span>
                                <span class="px-2.5 py-1 text-xs font-semibold rounded-md ${getStatusColor(order.status)}">${order.status}</span>
                            </div>
                            <div class="space-y-1 text-sm text-slate-500">
                                <p><span class="inline-block w-20">Tanggal</span>: <span class="text-slate-700 font-medium">${order.date}</span></p>
                                <p><span class="inline-block w-20">Tipe</span>: <span class="text-slate-700">${order.sales_type}</span></p>
                                <p><span class="inline-block w-20">Pelanggan</span>: <span class="text-slate-700">${order.customer}</span></p>
                            </div>
                        </div>
                        <div class="w-full md:w-auto p-4 bg-white md:bg-transparent rounded-xl md:rounded-none border border-neutral-100 md:border-none text-left md:text-right">
                            <p class="text-sm text-slate-500 mb-1">Total Belanja</p>
                            <p class="font-bold text-slate-900 text-xl font-poppins">Rp ${Number(order.total).toLocaleString('id-ID')}</p>
                            ${Number(order.remaining_payment) > 0 
                                ? `<p class="text-sm text-red-600 font-medium mt-2 bg-red-50/50 md:bg-transparent py-1 px-2 md:p-0 rounded-md">Sisa Bayar: Rp ${Number(order.remaining_payment).toLocaleString('id-ID')}</p>` 
                                : ''}
                        </div>
                    </div>
                `).join('');
            }

            function renderPagination(totalPages, totalRecords, currentPageIndex, period) {
                const pagination = document.getElementById('pagination');
                if (totalPages <= 1) {
                    pagination.classList.add('hidden');
                    return;
                }
                
                pagination.classList.remove('hidden');
                const prevBtn = document.getElementById('prev-page');
                const nextBtn = document.getElementById('next-page');
                const info = document.getElementById('page-info');

                info.textContent = `Halaman ${currentPageIndex} dari ${totalPages}`;

                prevBtn.disabled = currentPageIndex <= 1;
                nextBtn.disabled = currentPageIndex >= totalPages;

                prevBtn.onclick = () => {
                    if (currentPageIndex > 1) {
                        currentPage = currentPageIndex - 1;
                        fetchOrders(currentPage);
                    }
                };

                nextBtn.onclick = () => {
                    if (currentPageIndex < totalPages) {
                        currentPage = currentPageIndex + 1;
                        fetchOrders(currentPage);
                    }
                };
            }

            // Initial fetch
            fetchOrders(currentPage);
        });
    </script>
</body>

</html>

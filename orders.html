<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/webp" href="/assets/images/logo.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya - Master Kuliner Indonesia</title>

    <!-- FONT POPPINS & INTER -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="/css/main.css" rel="stylesheet">
</head>

<body class="bg-gray-50 font-inter text-slate-800 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <header
        class="fixed top-0 left-0 right-0 w-full z-50 transition-all duration-300 bg-white/95 backdrop-blur-sm border-b border-neutral-100 h-20">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a class="cursor-pointer flex items-center gap-3" href="/store.html">
                <div class="w-24">
                    <img src="/assets/images/logo.webp" alt="Logo" class="w-full h-full object-contain">
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="/store.html"
                    class="hidden md:flex items-center gap-2 mr-2 px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 hover:text-red-600 hover:border-red-200 rounded-xl transition-all shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Kembali ke Toko
                </a>

                <!-- Profile Section -->
                <div class="relative">
                    <button id="profile-btn"
                        class="flex items-center gap-3 hover:bg-gray-50 px-3 py-2 rounded-lg transition-colors">
                        <div
                            class="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-sm">
                            <span id="user-avatar">U</span>
                        </div>
                        <div class="hidden md:block text-left">
                            <p class="text-sm font-semibold text-slate-900" id="user-name">User</p>
                            <p class="text-xs text-slate-500" id="user-role">Partner</p>
                        </div>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>

                    <!-- Dropdown Menu -->
                    <div id="profile-dropdown"
                        class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-neutral-100 py-1 z-50 hidden">
                        <a href="#"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            Profile
                        </a>
                        <a href="/course.html" id="course-link"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                                </path>
                            </svg>
                            Course
                        </a>
                        <a href="/orders.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-red-600 font-semibold hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                                </path>
                            </svg>
                            Pesanan Saya
                        </a>
                        <hr class="my-1 border-neutral-100">
                        <button id="logout-btn"
                            class="flex items-center gap-3 w-full px-4 py-2 text-sm text-slate-700 hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                </path>
                            </svg>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-16">
        <div class="container mx-auto px-4 max-w-5xl">
            <h1 class="text-2xl md:text-3xl font-poppins font-bold text-slate-900 mb-6">Pesanan Saya</h1>

            <!-- Summary Cards -->
            <div id="summary-cards" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                <!-- Skeleton Loading -->
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div
                    class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse hidden md:block">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div
                    class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse hidden md:block">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
            </div>

            <!-- Orders Container -->
            <div class="bg-white rounded-2xl shadow-sm border border-neutral-100 overflow-hidden">
                <!-- Loading -->
                <div id="loading-state" class="text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
                    <p class="mt-4 text-gray-600">Memuat pesanan...</p>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="text-center py-12 hidden">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                        </path>
                    </svg>
                    <h3 class="mt-4 text-sm font-medium text-gray-900">Belum ada pesanan</h3>
                    <p class="mt-1 text-sm text-gray-500">Anda belum melakukan pemesanan apapun.</p>
                    <a href="/store.html"
                        class="mt-6 inline-block bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded-xl transition-colors">
                        Mulai Belanja
                    </a>
                </div>

                <!-- Orders Table Container -->
                <div class="overflow-x-auto hidden bg-gray-50 md:bg-transparent p-4 md:p-0" id="orders-table-container">
                    <table class="w-full md:min-w-[800px] text-left border-collapse block md:table">
                        <thead class="hidden md:table-header-group">
                            <tr
                                class="bg-gray-50 border-b border-neutral-100 text-xs uppercase tracking-wider text-slate-500 font-semibold block md:table-row">
                                <th class="p-4 whitespace-nowrap">No. Invoice</th>
                                <th class="p-4 whitespace-nowrap text-center">Status</th>
                                <th class="p-4 whitespace-nowrap">Tanggal</th>
                                <th class="p-4 whitespace-nowrap">Pelanggan</th>
                                <th class="p-4 whitespace-nowrap">Tipe</th>
                                <th class="p-4 whitespace-nowrap text-right">Total</th>
                                <th class="p-4 whitespace-nowrap text-right">Sisa Bayar</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body" class="block md:table-row-group space-y-4 md:space-y-0">
                            <!-- Orders will be loaded here -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div id="pagination"
                    class="p-6 border-t border-neutral-100 flex flex-col sm:flex-row items-center justify-end gap-4 hidden bg-gray-50 md:bg-white rounded-b-2xl">
                    <span id="page-info" class="text-sm font-medium text-slate-600">Halaman 1 dari 1</span>
                    <div class="flex items-center gap-2">
                        <button id="prev-page"
                            class="px-4 py-2 bg-white border border-neutral-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50 hover:text-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                            Sebelumnya
                        </button>
                        <button id="next-page"
                            class="px-4 py-2 bg-white border border-neutral-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50 hover:text-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                            Selanjutnya
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="/js/modules/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="/js/pages/orders.js"></script>
</body>

</html>

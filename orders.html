<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/webp" href="/assets/images/logo.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya - Master Kuliner Indonesia</title>

    <!-- FONT POPPINS & INTER -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="/css/main.css" rel="stylesheet">

    <!-- REMIXICON -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body class="bg-gray-50 font-inter text-slate-800 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <header
        class="fixed top-0 left-0 right-0 w-full z-50 transition-all duration-300 bg-white/95 backdrop-blur-sm border-b border-neutral-100 h-20">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a class="cursor-pointer flex items-center gap-3" href="/store.html">
                <div class="w-24">
                    <img src="/assets/images/logo.webp" alt="Logo" class="w-full h-full object-contain">
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="/store.html"
                    class="hidden md:flex items-center gap-2 mr-2 px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 hover:text-red-600 hover:border-red-200 rounded-xl transition-all shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Kembali ke Toko
                </a>

                <!-- Global Profile Navigation Placeholder -->
                <div id="profile-nav-placeholder"></div>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-16">
        <div class="container mx-auto px-4 max-w-7xl">
            <h1 class="text-2xl md:text-3xl font-poppins font-bold text-slate-900 mb-6">Pesanan Saya</h1>

            <!-- Summary Cards -->
            <div id="summary-cards" class="grid grid-cols-2 lg:grid-cols-6 md:grid-cols-3 gap-4 mb-6">
                <!-- Skeleton Loading -->
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div
                    class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse hidden md:block">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div
                    class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse hidden md:block">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
                <div
                    class="bg-white rounded-2xl p-4 shadow-sm border border-neutral-100 text-center animate-pulse hidden lg:block">
                    <div class="h-8 bg-gray-200 rounded mx-auto w-12 mb-2"></div>
                    <div class="h-3 bg-gray-200 rounded w-full mx-auto"></div>
                </div>
            </div>

            <!-- Orders Container -->
            <div class="bg-white rounded-2xl shadow-sm border border-neutral-100 overflow-hidden">
                <div class="p-4 border-b border-neutral-100 bg-white">
                    <div class="flex flex-col md:flex-row md:items-center gap-3">
                        <div class="flex-1">
                            <input id="orders-search" type="search" placeholder="Cari No. Invoice (mis. INV-0420260003)" class="w-full px-4 py-2 rounded-xl border border-neutral-200" />
                        </div>

                        <select id="orders-status" class="px-3 py-2 rounded-xl border border-neutral-200 bg-white text-sm">
                            <option value="">Semua Status</option>
                            <option value="menunggu_konfirmasi">Menunggu Konfirmasi</option>
                            <option value="menunggu_pembayaran">Menunggu Pembayaran</option>
                            <option value="sedang_diverifikasi">Sedang Diverifikasi</option>
                            <option value="bayar_sebagian">Bayar Sebagian</option>
                            <option value="sedang_diproses">Sedang Diproses</option>
                            <option value="paket_terkirim">Paket Terkirim</option>
                            <option value="batal">Batal</option>
                        </select>

                        <input id="orders-start-date" type="date" class="px-3 py-2 rounded-xl border border-neutral-200 bg-white text-sm" />
                        <input id="orders-end-date" type="date" class="px-3 py-2 rounded-xl border border-neutral-200 bg-white text-sm" />

                        <div>
                            <button id="orders-apply-filters" class="px-4 py-2 rounded-xl bg-red-600 text-white hover:bg-red-700">Terapkan</button>
                        </div>
                    </div>
                </div>
                <!-- Loading -->
                <div id="loading-state" class="text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
                    <p class="mt-4 text-gray-600">Memuat pesanan...</p>
                </div>

                <!-- Empty State -->
                <div id="empty-state" class="text-center py-12 hidden">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                        </path>
                    </svg>
                    <h3 class="mt-4 text-sm font-medium text-gray-900">Belum ada pesanan</h3>
                    <p class="mt-1 text-sm text-gray-500">Anda belum melakukan pemesanan apapun.</p>
                    <a href="/store.html"
                        class="mt-6 inline-block bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-6 rounded-xl transition-colors">
                        Mulai Belanja
                    </a>
                </div>

                <!-- Orders Table Container -->
                <div class="overflow-x-auto hidden bg-gray-50 md:bg-transparent p-4 md:p-0" id="orders-table-container">
                    <table class="w-full md:min-w-[800px] text-left border-collapse block md:table">
                        <thead class="hidden md:table-header-group">
                            <tr
                                class="bg-gray-50 border-b border-neutral-100 text-xs uppercase tracking-wider text-slate-500 font-semibold block md:table-row">
                                <th class="p-4 whitespace-nowrap">No. Invoice</th>
                                <th class="p-4 whitespace-nowrap text-center">Status</th>
                                <th class="p-4 whitespace-nowrap">Tanggal</th>
                                <th class="p-4 whitespace-nowrap">Pelanggan</th>
                                <th class="p-4 whitespace-nowrap">Tipe</th>
                                <th class="p-4 whitespace-nowrap text-right">Total</th>
                                <th class="p-4 whitespace-nowrap text-right">Sisa Bayar</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body" class="block md:table-row-group space-y-4 md:space-y-0">
                            <!-- Orders will be loaded here -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div id="pagination"
                    class="p-6 border-t border-neutral-100 flex flex-col sm:flex-row items-center justify-end gap-4 hidden bg-gray-50 md:bg-white rounded-b-2xl">
                    <span id="page-info" class="text-sm font-medium text-slate-600">Halaman 1 dari 1</span>
                    <div class="flex items-center gap-2">
                        <button id="prev-page"
                            class="px-4 py-2 bg-white border border-neutral-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50 hover:text-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                            Sebelumnya
                        </button>
                        <button id="next-page"
                            class="px-4 py-2 bg-white border border-neutral-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-gray-50 hover:text-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                            Selanjutnya
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modern Logout Modal -->
    <div id="logoutModal" class="fixed inset-0 z-[2000] hidden overflow-y-auto px-4 py-6 sm:px-0">
        <!-- Backdrop with glassmorphism -->
        <div onclick="closeLogoutModal()"
            class="fixed inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity duration-300"></div>

        <!-- Modal Card -->
        <div class="relative mx-auto mt-40 max-w-sm transform overflow-hidden rounded-3xl bg-white shadow-2xl transition-all duration-300 scale-95 opacity-0"
            id="logoutModalCard">
            <div class="p-8 text-center">
                <!-- Warning Icon -->
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-50 text-amber-500 mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
                
                <h2 class="text-xl font-bold text-slate-900 font-poppins mb-2">Keluar Akun?</h2>
                <p class="text-slate-500 text-sm mb-8">Anda perlu masuk kembali untuk mengakses portal kemitraan Anda.</p>

                <div class="space-y-3">
                    <button onclick="confirmLogout()"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-600/20 transition-all transform active:scale-[0.98]">
                        Ya, Keluar
                    </button>
                    <button onclick="closeLogoutModal()"
                        class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all transform active:scale-[0.98]">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/js/modules/api.js"></script>
    <script src="/js/modules/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="/js/pages/orders.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/webp" href="/assets/images/logo.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - Master Kuliner Indonesia</title>

    <!-- FONT POPPINS & INTER -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="/css/main.css" rel="stylesheet">

    <!-- REMIXICON -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .category-chip {
            white-space: nowrap;
            padding: 8px 24px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        .active-chip {
            background-color: #dc2626;
            color: white;
            border-color: #dc2626;
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.25);
            transform: translateY(-1px);
        }

        .inactive-chip {
            background-color: #f8fafc;
            color: #475569;
        }

        .inactive-chip:hover {
            background-color: #f1f5f9;
            color: #dc2626;
            border-color: #dc2626;
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="bg-white font-inter text-slate-800 antialiased overflow-x-hidden">

    <!-- Navbar -->
    <header
        class="fixed top-0 left-0 right-0 w-full z-50 transition-all duration-300 bg-white/95 backdrop-blur-sm border-b border-neutral-100 h-20">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a class="cursor-pointer flex items-center gap-3" href="/">
                <div class="w-24">
                    <img src="/assets/images/logo.webp" alt="Logo" class="w-full h-full object-contain">
                </div>
            </a>
            <div class="flex items-center gap-4">
                <button id="cart-btn"
                    class="relative p-2 text-slate-700 hover:text-red-600 transition-colors cursor-pointer">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 3h2l.4 2M7 13h10l4-8H5.4m0 0L7 13m0 0l-1.1 5H19M7 13l-1.1 5M7 13h10m0 0v8a2 2 0 01-2 2H9a2 2 0 01-2-2v-8z">
                        </path>
                    </svg>
                    <span id="cart-count"
                        class="absolute -top-1 -right-1 bg-red-600 text-white text-xs font-bold rounded-full h-4 w-4 flex items-center justify-center text-[10px]">0</span>
                </button>

                <!-- Global Profile Navigation Placeholder -->
                <div id="profile-nav-placeholder"></div>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-16">
        <div class="container mx-auto px-4 max-w-7xl">

            <!-- Actions Area: Search & Filters -->
            <div class="mb-6 flex flex-col md:flex-row gap-4 items-center w-full">
                <!-- Search Input -->
                <div class="flex-1 w-full relative">
                    <input type="text" id="search-input" placeholder="Cari produk berdasarkan nama atau brand..."
                        class="w-full px-4 py-3 pl-12 pr-4 border border-neutral-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all shadow-sm shadow-slate-100">
                    <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-400"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                
                <!-- Filter Dropdowns -->
                <div class="flex flex-row gap-3 w-full md:w-auto">
                    <!-- Category Dropdown -->
                    <div class="relative flex-1 md:flex-none">
                        <select id="product-category-select" class="w-full md:w-auto min-w-[140px] appearance-none bg-white border border-neutral-200 text-slate-700 py-3 pl-4 pr-10 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-red-500 cursor-pointer shadow-sm transition-all hover:border-slate-300">
                            <option value="All">Semua Kategori</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                    
                    <!-- Price Dropdown -->
                    <div class="relative flex-1 md:flex-none">
                        <select id="price-sort-select" class="w-full md:w-auto min-w-[140px] appearance-none bg-white border border-neutral-200 text-slate-700 py-3 pl-4 pr-10 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-red-500 cursor-pointer shadow-sm transition-all hover:border-slate-300">
                            <option value="Default">Urutkan Harga</option>
                            <option value="asc">Termurah</option>
                            <option value="desc">Termahal</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Category Filters -->
            <div class="mb-10 overflow-x-auto no-scrollbar -mx-4 px-4 w-[100vw] md:w-full md:mx-0 md:px-0">
                <div id="category-filters" class="flex gap-2 md:gap-3 w-max min-w-max pt-2 pb-4 pr-6 md:pr-0">
                    <!-- Dynamic Category Chips -->
                    <button class="bg-red-600 text-white px-5 py-2 rounded-full text-xs md:text-sm font-bold shadow-md">Semua</button>
                    <div class="animate-pulse bg-slate-100 h-9 w-24 rounded-full"></div>
                    <div class="animate-pulse bg-slate-100 h-9 w-20 rounded-full"></div>
                    <div class="animate-pulse bg-slate-100 h-9 w-28 rounded-full"></div>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="products-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-6">
                <!-- Products will be loaded here -->
            </div>

            <!-- Loading -->
            <div id="loading" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div>
                <p class="mt-4 text-gray-600">Memuat produk...</p>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="text-center py-12 hidden">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2M4 13h2m8-5v2m0 0v2m0-2h2m-2 0h-2">
                    </path>
                </svg>
                <h3 class="mt-2 text-sm font-medium text-gray-900">Tidak ada produk</h3>
                <p class="mt-1 text-sm text-gray-500">Produk akan segera ditambahkan.</p>
            </div>

        </div>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-2xl max-w-md w-full max-h-[80vh] overflow-hidden">
                <div class="p-6 border-b border-neutral-100 relative">
                    <div class="flex items-center justify-between">
                        <h2 class="text-xl font-bold text-slate-900">Keranjang Belanja</h2>
                        <div class="flex items-center gap-3">
                            <button id="clear-cart-btn"
                                class="text-red-500 hover:text-red-700 text-sm font-medium transition-colors hidden">
                                Hapus Semua
                            </button>
                            <button id="close-cart-modal"
                                class="text-gray-500 hover:text-gray-700 transition-colors p-2 rounded-full bg-white shadow-sm border border-gray-200 hover:bg-gray-50">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M6 18L18 6M6 6l12 12"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div id="cart-items" class="p-6 max-h-96 overflow-y-auto">
                    <!-- Cart items will be loaded here -->
                    <p class="text-gray-500 text-center">Keranjang kosong</p>
                </div>
                <div class="p-6 border-t border-neutral-100">
                    <div class="flex justify-between items-center mb-4">
                        <span class="font-semibold">Total:</span>
                        <span id="cart-total" class="font-bold text-red-600">Rp 0</span>
                    </div>
                    <button id="checkout-btn"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                        Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modern Logout Modal -->
    <div id="logoutModal" class="fixed inset-0 z-[2000] hidden overflow-y-auto px-4 py-6 sm:px-0">
        <!-- Backdrop with glassmorphism -->
        <div onclick="closeLogoutModal()"
            class="fixed inset-0 bg-slate-900/40 backdrop-blur-md transition-opacity duration-300"></div>

        <!-- Modal Card -->
        <div class="relative mx-auto mt-40 max-w-sm transform overflow-hidden rounded-3xl bg-white shadow-2xl transition-all duration-300 scale-95 opacity-0"
            id="logoutModalCard">
            <div class="p-8 text-center">
                <!-- Warning Icon -->
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-amber-50 text-amber-500 mb-6">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
                
                <h2 class="text-xl font-bold text-slate-900 font-poppins mb-2">Keluar Akun?</h2>
                <p class="text-slate-500 text-sm mb-8">Anda perlu masuk kembali untuk mengakses portal kemitraan Anda.</p>

                <div class="space-y-3">
                    <button onclick="confirmLogout()"
                        class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-600/20 transition-all transform active:scale-[0.98]">
                        Ya, Keluar
                    </button>
                    <button onclick="closeLogoutModal()"
                        class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all transform active:scale-[0.98]">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="/js/modules/api.js"></script>
    <script src="/js/modules/components.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="/js/pages/store.js"></script>
</body>

</html>
